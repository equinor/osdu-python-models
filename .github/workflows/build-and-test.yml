name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check tools tests samples

      - name: Fetch OSDU example payloads (best-effort)
        continue-on-error: true
        run: |
          # Round-trip tests validate against canonical OSDU example payloads,
          # expected at ../data-definitions/Examples (sibling checkout). Fetch
          # just the Examples tree via a shallow sparse clone; if it fails, the
          # example-based tests skip and only generation + import are checked.
          git clone --depth 1 --filter=blob:none --sparse \
            https://community.opengroup.org/osdu/data/data-definitions.git \
            ../data-definitions
          git -C ../data-definitions sparse-checkout set Examples

      - name: Generate models from schemas
        run: uv run python tools/generate.py

      - name: Test
        run: uv run pytest -q -rs
