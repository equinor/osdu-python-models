name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    permissions:
      contents: write # Required to update changelog file
      pull-requests: write # Required to create release PRs
    uses: equinor/ops-actions/.github/workflows/release-please-manifest.yml@792c28d178029e9d2b5ae027e3acbe18da89e9ed # v9.38.2

  build-and-publish:
    name: Build and publish
    needs: release-please
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload assets to the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Generate models from schemas
        # Generated models are gitignored; they must exist on disk so the build
        # backend packages them into the wheel and sdist.
        run: uv run python tools/generate.py

      - name: Build wheel and sdist
        run: uv build --out-dir dist

      - name: Upload built distributions as artifact
        # Hand the dist off to the pypi-publish job, which runs with its own
        # minimal (id-token only) permissions for Trusted Publishing.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

      - name: Upload assets to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release-please (on push) or a maintainer (on dispatch) has already
          # created the GitHub Release; it is the most recent one. Attach the
          # built distributions to it.
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "Uploading dist/* to release $tag"
          gh release upload "$tag" dist/* --clobber

  pypi-publish:
    name: Publish to PyPI
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/osdu-python-models
    permissions:
      id-token: write # Required for PyPI Trusted Publishing (OIDC) — no secrets needed.
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
